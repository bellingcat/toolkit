name: Mark tool updates

# The nightly Sync GitBook workflow runs mark-tool-updates between its
# export and import jobs — this workflow exists for manual runs only.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Validate and format JSON
        run: node src/normalize.mjs

      - name: Mark tool updates
        run: node src/mark-tool-updates.mjs
        env:
          GITBOOK_API_TOKEN: ${{ secrets.GITBOOK_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -n "$(git status --porcelain gitbook/tools gitbook/SUMMARY.md)" ]; then
            git add gitbook/tools gitbook/SUMMARY.md
            git commit -m "Mark tool updates"
          fi

      - name: Push changes
        run: |
          if [ -n "$(git log origin/main..HEAD --oneline)" ]; then
            git pull --rebase origin main
            git push origin main
          fi
