name: Sync GitBook

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  export:
    name: Export (GitBook → GitHub)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: npm install

      - name: Fetch project items
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
        run: npm run proj

      - name: Export from GitBook
        env:
          GITBOOK_API_TOKEN: ${{ secrets.GITBOOK_API_TOKEN }}
          GH_REPO_TOKEN: ${{ secrets.GH_REPO_TOKEN }}
        run: node src/sync-from-gitbook.mjs

      # GitBook pushes exported content directly to the remote during the step above.
      # Rebase our local clone on top of those commits before we commit the checkpoint,
      # otherwise the checkpoint push would either fail (non-fast-forward) or, if forced,
      # overwrite the exported content with a stale tree.
      - name: Pull GitBook exports
        run: git pull --rebase origin main

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          base: HEAD
          filters: |
            all:
              - '**'

      - name: Commit changes
        if: steps.changes.outputs.all == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Sync: Export from GitBook"

      - name: Push changes
        if: steps.changes.outputs.all == 'true'
        uses: ad-m/github-push-action@master
        with:
          branch: main
          force: false

  import:
    name: Import (GitHub → GitBook)
    runs-on: ubuntu-latest
    needs: export

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install dependencies
        run: npm install

      - name: Fetch project items
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
        run: npm run proj

      - name: Import to GitBook
        env:
          GITBOOK_API_TOKEN: ${{ secrets.GITBOOK_API_TOKEN }}
          GH_REPO_TOKEN: ${{ secrets.GH_REPO_TOKEN }}
        run: node src/import-to-gitbook.mjs
