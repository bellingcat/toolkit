name: Sync GitBook

# Single job: export (GitBook → repo), build, then import (repo → GitBook).
# The order matters twice over: the export pulls GitBook-side edits down
# before the build regenerates derived files, and the build commits must be
# pushed to main before the import runs, because GitBook's import pulls from
# the remote branch, not this checkout.

on:
  schedule:
    - cron: '23 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Sync (export → build → import)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Export from GitBook
        id: export
        env:
          GITBOOK_API_TOKEN: ${{ secrets.GITBOOK_API_TOKEN }}
          GH_REPO_TOKEN: ${{ secrets.GH_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
        run: |
          echo "start_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          node src/sync-from-gitbook.mjs

      - name: Commit export checkpoint
        run: |
          if [ -n "$(git status --porcelain last-synced.json)" ]; then
            git add last-synced.json
            git commit -m "Sync: Export from GitBook"
          fi

      # The export API is asynchronous: GitBook pushes each exported tool's
      # commit to main on its own schedule. Wait for the expected commits so
      # the build below runs on the exported content rather than a stale tree.
      # If an export produced no content diff (e.g. an empty change request
      # was merged), no commit ever lands and the shared deadline caps the
      # wait at 5 minutes total before the build proceeds.
      - name: Wait for exported content to land on main
        if: steps.export.outputs.exported != ''
        env:
          EXPORTED: ${{ steps.export.outputs.exported }}
          START_SHA: ${{ steps.export.outputs.start_sha }}
        run: |
          deadline=$(( $(date +%s) + 300 ))
          for slug in $EXPORTED; do
            while true; do
              git fetch --quiet origin main
              if [ -n "$(git log "$START_SHA..origin/main" --grep="^Sync: Export $slug from GitBook" --format=%H)" ]; then
                echo "Export commit for $slug landed"
                break
              fi
              if [ "$(date +%s)" -ge "$deadline" ]; then
                echo "::warning::No export commit for $slug after 5 minutes — likely a no-diff export (e.g. empty change request), building without it. If GitBook was just slow, the commit lands on main later and syncs tomorrow."
                break
              fi
              sleep 15
            done
          done

      - name: Pull exported content
        run: git pull --rebase origin main

      - name: Validate and format JSON
        run: node src/normalize.mjs

      - name: Mark tool updates
        env:
          GITBOOK_API_TOKEN: ${{ secrets.GITBOOK_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
        run: node src/mark-tool-updates.mjs

      - name: Update categories
        run: node src/categories.mjs

      - name: Update regions
        run: node src/regions.mjs

      - name: Commit build changes
        run: |
          if [ -n "$(git status --porcelain gitbook/categories)" ]; then
            git add gitbook/categories
            git commit -m "Sync: Update Categories"
          fi
          if [ -n "$(git status --porcelain gitbook/regions)" ]; then
            git add gitbook/regions
            git commit -m "Sync: Update Regions"
          fi
          if [ -n "$(git status --porcelain gitbook/tools gitbook/SUMMARY.md)" ]; then
            git add gitbook/tools gitbook/SUMMARY.md
            git commit -m "Sync: Update Tools"
          fi

      # Everything committed above must be on remote main before the import
      # runs. Any leftover uncommitted changes are discarded (visibly) so the
      # rebase below starts from a clean tree.
      - name: Push export and build commits
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Discarding uncommitted changes:"
            git status --porcelain
            git checkout -- .
          fi
          git pull --rebase origin main
          git push origin main

      - name: Import to GitBook
        env:
          GITBOOK_API_TOKEN: ${{ secrets.GITBOOK_API_TOKEN }}
          GH_REPO_TOKEN: ${{ secrets.GH_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
        run: node src/import-to-gitbook.mjs

      - name: Commit and push import checkpoint
        run: |
          if [ -n "$(git status --porcelain last-synced.json)" ]; then
            git add last-synced.json
            git commit -m "Sync: Import to GitBook"
            git pull --rebase origin main
            git push origin main
          fi
