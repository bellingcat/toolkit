name: Sync GitBook

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  export:
    name: Export (GitBook → GitHub)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: npm install

      - name: Export from GitBook
        env:
          GITBOOK_API_TOKEN: ${{ secrets.GITBOOK_API_TOKEN }}
          GH_REPO_TOKEN: ${{ secrets.GH_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
        run: node src/sync-from-gitbook.mjs

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          base: HEAD
          filters: |
            all:
              - '**'

      - name: Commit changes
        if: steps.changes.outputs.all == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add gitbook/tools last-synced.json
          git commit -m "Sync: Export from GitBook"

      - name: Push changes
        if: steps.changes.outputs.all == 'true'
        uses: ad-m/github-push-action@master
        with:
          branch: main
          force: false

  build:
    runs-on: ubuntu-latest
    needs: export
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Validate and format JSON
        run: node src/normalize.mjs

      - name: Mark tool updates
        run: node src/mark-tool-updates.mjs
        env:
          GITBOOK_API_TOKEN: ${{ secrets.GITBOOK_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}


      - name: Run node script to update categories
        run: |
          node src/categories.mjs

      - name: Run node script to update regions
        run: |
          node src/regions.mjs

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          base: HEAD
          filters: |
            all:
              - '**'
            categories:
              - 'gitbook/categories/**'
            tools:
              - 'gitbook/tools/**'

      - name: Commit categories
        if: steps.changes.outputs.categories == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add gitbook/categories
          git commit -m "Build: Update Categories"

      - name: Commit tools
        if: steps.changes.outputs.tools == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add gitbook/tools
          git commit -m "Build: Update Tools"

      - name: Push changes
        if: steps.changes.outputs.all == 'true'
        uses: ad-m/github-push-action@master
        with:
          branch: main
          force: false

  import:
    name: Import (GitHub → GitBook)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install dependencies
        run: npm install

      - name: Import to GitBook
        env:
          GITBOOK_API_TOKEN: ${{ secrets.GITBOOK_API_TOKEN }}
          GH_REPO_TOKEN: ${{ secrets.GH_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
        run: node src/import-to-gitbook.mjs
