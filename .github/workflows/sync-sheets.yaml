name: Sync Google Sheets
on:
  workflow_run:
    workflows: ["Sync Github Project"]
    # Intentionally runs even when the project sync failed (no
    # conclusion == 'success' guard): the Members tab syncs GitBook data
    # independent of the GitHub Project, and the Tools tab reads the
    # project live, so a failed project sync only means stale rows.
    types: [completed]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Sync to Google Sheets
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
          GITBOOK_API_TOKEN: ${{ secrets.GITBOOK_API_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: node src/sync-sheets.mjs
