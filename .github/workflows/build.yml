name: Build

# The nightly Sync GitBook workflow runs these same build steps between its
# export and import jobs — this workflow exists for manual runs only.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Validate and format JSON
        run: node src/normalize.mjs

      - name: Run node script to update categories
        run: node src/categories.mjs

      - name: Run node script to update regions
        run: node src/regions.mjs

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -n "$(git status --porcelain gitbook/categories)" ]; then
            git add gitbook/categories
            git commit -m "Build: Update Categories"
          fi
          if [ -n "$(git status --porcelain gitbook/regions)" ]; then
            git add gitbook/regions
            git commit -m "Build: Update Regions"
          fi
          if [ -n "$(git status --porcelain gitbook/tools gitbook/SUMMARY.md)" ]; then
            git add gitbook/tools gitbook/SUMMARY.md
            git commit -m "Build: Update Tools"
          fi

      - name: Push changes
        run: |
          if [ -n "$(git log origin/main..HEAD --oneline)" ]; then
            git pull --rebase origin main
            git push origin main
          fi
