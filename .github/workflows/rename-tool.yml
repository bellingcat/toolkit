name: Rename Tool
run-name: Rename ${{ inputs.toolName }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      oldToolName:
        description: 'Old Tool Name'
        type: string
        required: true
      newToolName:
        description: 'New Tool Name'
        type: string
        required: true

jobs:
  rename-tool:
    runs-on: ubuntu-latest
    env:
      OLD_TOOL_NAME: ${{ inputs.oldToolName }}
      NEW_TOOL_NAME: ${{ inputs.newToolName }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Rename tool
        id: rename-tool
        run: |
          node src/rename-tool.mjs "$OLD_TOOL_NAME" "$NEW_TOOL_NAME"
          if [ -n "$(git status gitbook --porcelain)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes ${{ steps.rename-tool.outputs.changes }}
        if: ${{ steps.rename-tool.outputs.changes == 'true' }}
        run: |
          git status --porcelain
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add gitbook
          git commit -m "Rename '$TOOL_NAME' to '$NEW_TOOL_NAME'"

      - name: Push changes
        if: ${{ steps.rename-tool.outputs.changes == 'true' }}
        uses: ad-m/github-push-action@master
        with:
          branch: main

      - name: Sync project data and extract IDs
        run: |
          npm run proj
          echo 'PROJECT_ID='$(jq '.data.organization.projectV2.id' project_data.json) >> $GITHUB_ENV
          echo 'TOOLID_FIELD_ID='$(jq '.data.organization.projectV2.fields.nodes[] | select(.name== "Tool ID") | .id' project_data.json) >> $GITHUB_ENV
          echo 'ITEM_ID='$(jq -r --arg slug '${{ env.NEW_TOOL_NAME }}' '.[] | select(.fieldValues.nodes[] | select(.field.name == "Tool ID" and .text == $slug)) | .id' project_items.json) >> $GITHUB_ENV


      - name: Update Tool ID field
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
        run: |
          gh api graphql -f query='
            mutation (
              $project: ID!
              $item: ID!
              $tool_field: ID!
              $tool_value: String!
            ) {
              set_tool_id: updateProjectV2ItemFieldValue(input: {
                projectId: $project
                itemId: $item
                fieldId: $tool_field
                value: {
                  text: $tool_value
                  }
              }) {
                projectV2Item {
                  id
                  }
              }
            }' -f project=$PROJECT_ID -f item=$ITEM_ID -f tool_field=$TOOLID_FIELD_ID -f tool_value=${{ env.NEW_TOOL_NAME }} --silent

            #'
